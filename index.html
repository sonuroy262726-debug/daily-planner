<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="planner-app">
            <h1>📅 Daily Planner</h1>
            
            <div class="input-section">
                <div class="task-input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="Enter task description..."
                        autocomplete="off"
                    >
                </div>
                
                <div class="options-row">
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    
                    <input type="date" id="dueDateInput" class="date-input">
                    <input type="time" id="timeInput" class="time-input">
                    
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="active">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
            </div>
            
            <div class="sort-options">
                <label>Sort by:</label>
                <select id="sortSelect">
                    <option value="date-asc">Due Date (Earliest First)</option>
                    <option value="date-desc">Due Date (Latest First)</option>
                    <option value="priority">Priority (High to Low)</option>
                    <option value="newest">Newest First</option>
                </select>
            </div>
            
            <ul id="taskList" class="task-list"></ul>
            
            <div class="stats">
                <span id="taskStats">0 pending • 0 completed</span>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
